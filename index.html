<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Página de cadastro</title>
</head>
<body>
    <form>
        <div class="forms">
        <h1 class="titulo">Cadastro de usuário</h1>
        <label for="nome">Digite seu nome completo:</label>
        <input type="text" id="nome"  placeholder="ex: Isabelle Cunha" required>
        <label for="email">Digite seu email:</label>
        <input type="email" id="email" placeholder="ex: isabelle@gmail.com">
        <label for="idade">Digite sua idade:</label>
        <input type="number" id="idade" placeholder="ex: 18" minlength="0" maxlength="120">
        <button class="botao">Cadastrar</button>
        </div>
    </form>
</body>
</html>
