<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de cadastro</title>
</head>
<body>

    <form>
        <div class="forms">
            <p>© by isacdcunha</p>
            <h1 class="titulo">Cadastro de usuário</h1>

            <label for="nome">Digite seu nome completo:</label>
            <input type="text" id="nome" placeholder="ex: Isabelle Cunha" required>

            <label for="email">Digite seu email:</label>
            <input type="email" id="email" name="email" placeholder="ex: isabelle@gmail.com" required>

            <label for="idade">Digite sua idade:</label>
            <input type="number" id="idade" placeholder="ex: 18">

            <button type="submit" class="botao">CADASTRAR</button>
        </div>
    </form>

    <div id="painelResposta" class="painel"></div>

    <script>
        document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    cadastro();
});

        function cadastro() {
            let campoNome = document.getElementById('nome').value;
            let campoEmail = document.getElementById('email').value;
            let campoIdade = document.getElementById('idade').value;
            let painel = document.getElementById('painelResposta');

            painel.style.display = "block";

            painel.innerHTML = `
                <span class="fechar" onclick="fecharPainel()">×</span>
                <h2>Dados cadastrados</h2>
                <p><strong>Nome completo: </strong> ${campoNome}</p>
                <p><strong>Email: </strong> ${campoEmail}</p>
                <p><strong>Idade: </strong> ${campoIdade}</p>
            `;
        }

        function fecharPainel() {
            document.getElementById('painelResposta').style.display = "none";
        }
    </script>

</body>
</html>


<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap');

* {
    padding: 0;
    margin: 0;
    font-family: 'DM Sans',Arial,sans-serif;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: #FFFDF2;
}

.forms p{
    font-size: 14px;
}


input{
    background-color: #FFFDF2;
    color: #000000;
    border-radius: 20px;
    padding: 30px;
}


.forms {
    display: flex;
    flex-direction: column;
    background-color: #000000;
    border-radius: 20px;
    padding: 30px;
    color: #FFFDF2;
}

.titulo {
    margin: 50px;
}

input {
    padding: 5px;
    margin: 15px 0;
    width: 400px;
    border: none;
    outline: none;
    height: 28px;
    padding-left: 15px;
}

.botao {
    width: 200px;
    padding: 10px;
    font-size: 18px;
    font-weight: bold;
    background-color: #FFFDF2;
    color: #000000;
    border-radius: 30px;
    border: none;
    margin-left: 100px;
    cursor: pointer;
    margin-top: 15px;
    
}

.botao:hover{
    transition: background-color 0.8s, color 0.8s;
    background-color: #888;
    color: #FFFDF2;
}

.painel {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 300px;
    background: #ffffff;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    padding: 20px;
    display: none;
    animation: aparecer 0.3s ease;
}

.painel h2 {
    margin-top: 0;
}

.painel p {
    margin: 8px 0;
}

.fechar {
    position: absolute;
    top: 10px;
    right: 12px;
    cursor: pointer;
    font-weight: bold;
    color: #888;
    font-size: 18px;
}

.fechar:hover {
    color: red;
}

@keyframes aparecer {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
